seed: 42
data:
  cache_dir: "cache"
  processed_dir: "data/processed"
  raw_dir: "data/raw"
  target_file: "data/raw/kepler_targets_1922.txt"
  n_bins: 512
preprocess:
  remove_nans: true
  normalize: "median"
  flatten_window: 301
  flatten_polyorder: 2
  sigma_clip: 5.0
bls:
  period_min: 0.6
  period_max: 12.0
  n_periods: 5000
  duration_grid: [0.015, 0.02, 0.03, 0.05, 0.08, 0.10]
inject:
  enable: true
  n_injections_per_star: 3
  depth_ppm_min: 200
  depth_ppm_max: 5000
  duration_frac_min: 0.015
  duration_frac_max: 0.10
  period_min: 0.6
  period_max: 12.0
train:
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  epochs: 50
  early_stop_patience: 8
  num_workers: 2
model:
  input_length: 512
  dropout: 0.3
